cors:
  originPatterns: http://prod-origem.exemplo.com
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL_PROD}
    username: ${DB_USER_PROD}
    password: ${DB_PASSWORD_PROD}
  jpa:
    hibernate:
      ddl-auto: validate
logging:
  level:
    root: WARN                  # Só loga avisos e erros graves
    br.com.seuprojeto: INFO     # Pode manter INFO para registrar "O pedido X foi finalizado"
    org.hibernate.SQL: ERROR    # Só loga se uma query falhar sintaticamente


