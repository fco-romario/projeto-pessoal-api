cors:
  originPatterns: http://localhost:8080,http://dev-origem.exemplo.com
server:
  port: 8888
security:
  jwt:
    token:
      issuer: projeto-pessoal-api
      secret-key: ${SECRET_KEY}
      secret-password: ${SECRET_PASSWORD}
      expire-lenght: 3600000
spring:
  application:
    name: Projeto Pessoal
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: ${DB_URL_DEV}
#    username: ${DB_USER_DEV}
#    password: ${DB_PASSWORD_DEV} essas partee sera criada dinamicamente na classe de configuração do teste container
  jpa:
    hibernate:
      ddl-auto: none
      open-in-view: false
#  profiles:
#    active: dev
spring-doc:
  paths-to-match:
    - /auth/**
    - /api/**/v1/**
  swagger-ui:
    use-root-path: true

logging:
  level:
    #root: OFF
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
